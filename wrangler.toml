name = "skins"
main = "src/index.ts"
compatibility_date = "2025-01-29"
compatibility_flags = ["nodejs_compat"]


[[d1_databases]]
binding = "DB"
database_name = "yggdrasil-db"
database_id = "c3e0fab2-4b95-4758-a35c-b67828d1abfc"


[[r2_buckets]]
binding = "SKINS"
bucket_name = "yggdrasil-skins"

# KV Namespace for sessions & rate limiting
[[kv_namespaces]]
binding = "KV"
id = "c16b789a65c04bd1baf4561a8ebdee64"

# Email Workers - receive verification emails
[email]
enabled = true

# Custom domain
routes = [
  { pattern = "skin.jlucraft.com", custom_domain = true }
]

# Static assets (frontend SPA)
[assets]
directory = "public"
not_found_handling = "single-page-application"
run_worker_first = true

# Environment variables (override in dashboard for prod)
[vars]
APP_NAME = "JLUCraft Skin Station"
MUA_UNION_ENDPOINT = "https://skin.mualliance.ltd/api/union"
MICROSOFT_CLIENT_ID = ""
EMAIL_VERIFICATION_RECIPIENT = "verify@skin.jlucraft.com"
EMAIL_VERIFICATION_TOKEN_BYTES = "16"
EMAIL_VERIFICATION_TTL_SECONDS = "86400"

# Secrets (set via `wrangler secret put`):
# JWT_SECRET, MICROSOFT_CLIENT_SECRET
